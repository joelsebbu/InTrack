AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: InTrack expense tracker — Lambda + API Gateway + GitLab storage

Parameters:
  GitLabBaseUrl:
    Type: String
    Default: https://gitlab.com/api/v4
    Description: GitLab API base URL
  GitLabProjectId:
    Type: String
    Description: GitLab project ID (numeric) or URL-encoded path (namespace%2Fproject)
  GitLabBranch:
    Type: String
    Default: main
    Description: Target branch for all commits
  GitLabTokenSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing the GitLab token (plain string)
  AuthSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret with username, password, and jwtSecret (JSON)
  CorsAllowOrigin:
    Type: String
    Default: '*'
    Description: CORS allowed origin for the PWA

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        GITLAB_BASE_URL: !Ref GitLabBaseUrl
        GITLAB_PROJECT_ID: !Ref GitLabProjectId
        GITLAB_BRANCH: !Ref GitLabBranch
        GITLAB_TOKEN_SECRET_ARN: !Ref GitLabTokenSecretArn
        AUTH_SECRET_ARN: !Ref AuthSecretArn

Resources:
  ExpenseApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsAllowOrigin
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  ExpenseFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: src/
      Description: Expense tracker API backed by GitLab repository storage
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Ref GitLabTokenSecretArn
                - !Ref AuthSecretArn
      Events:
        OAuthToken:
          Type: HttpApi
          Properties:
            ApiId: !Ref ExpenseApi
            Path: /oauth/token
            Method: POST
        GetMetadata:
          Type: HttpApi
          Properties:
            ApiId: !Ref ExpenseApi
            Path: /metadata
            Method: GET
        AddExpense:
          Type: HttpApi
          Properties:
            ApiId: !Ref ExpenseApi
            Path: /add
            Method: POST
        GenerateReport:
          Type: HttpApi
          Properties:
            ApiId: !Ref ExpenseApi
            Path: /reports/generate
            Method: POST
        SaveReport:
          Type: HttpApi
          Properties:
            ApiId: !Ref ExpenseApi
            Path: /reports/save
            Method: POST
        RefreshReport:
          Type: HttpApi
          Properties:
            ApiId: !Ref ExpenseApi
            Path: /reports/refresh
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - handler.ts

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ExpenseApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  ExpenseFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ExpenseFunction.Arn
